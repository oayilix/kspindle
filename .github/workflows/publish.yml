name: Publish SDK

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish, for example 0.5.0 or 0.5.0-SNAPSHOT"
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  publish-github-packages:
    name: Publish to GitHub Packages
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi

          if [[ -z "$VERSION" ]]; then
            echo "Resolved version is empty" >&2
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify publishable artifacts
        run: ./gradlew test lintDebug :sample:assembleRelease :kspindle-runtime:checkConsumerProguardRulesInJar publishAllPublicationsToLocalStagingRepository -PVERSION_NAME=${{ steps.version.outputs.version }}

      - name: Publish to GitHub Packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew publishAllPublicationsToGitHubPackagesRepository -PVERSION_NAME=${{ steps.version.outputs.version }}

      - name: Verify sample consumes published GitHub Packages artifacts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GRADLE_USER_HOME: ${{ runner.temp }}/gradle-gh-packages-verify
        run: |
          for attempt in 1 2 3; do
            if ./gradlew clean :sample:assembleRelease :sample-impl:kspKotlin -PusePublishedKspindle=true -PkspindleVersion=${{ steps.version.outputs.version }} --refresh-dependencies --rerun-tasks; then
              exit 0
            fi

            if [[ "$attempt" == "3" ]]; then
              exit 1
            fi

            sleep "$((attempt * 30))"
          done
