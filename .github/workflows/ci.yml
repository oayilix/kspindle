name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    name: Verify SDK build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Verify tests, Android release build, and publishable Maven layout
        run: ./gradlew test lintDebug :sample:assembleRelease :kspindle-runtime:checkConsumerProguardRulesInJar publishAllPublicationsToLocalStagingRepository
